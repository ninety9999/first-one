<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Solar System - NASA Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="stars"></div> <!-- الخلفية النجوم -->

<header>
    <img src="https://upload.wikimedia.org/wikipedia/commons/e/e5/NASA_logo.svg" 
         alt="NASA Logo" class="logo">
    <h1>🌌 The Solar System</h1>
    <p>Hover over a planet to explore it on NASA</p>
</header>

<section class="planets">

    <div class="card">
        <img src="https://solarsystem.nasa.gov/system/feature_items/images/18_mercury_new.png" alt="Mercury">
        <h2>Mercury</h2>
        <a href="https://solarsystem.nasa.gov/planets/mercury/overview/" target="_blank" class="nasa-link">
            View on NASA 🚀
        </a>
    </div>

    <div class="card">
        <img src="https://solarsystem.nasa.gov/system/feature_items/images/27_venus_jg.png" alt="Venus">
        <h2>Venus</h2>
        <a href="https://solarsystem.nasa.gov/planets/venus/overview/" target="_blank" class="nasa-link">
            View on NASA 🚀
        </a>
    </div>

    <div class="card">
        <img src="https://solarsystem.nasa.gov/system/feature_items/images/17_earth.png" alt="Earth">
        <h2>Earth</h2>
        <a href="https://solarsystem.nasa.gov/planets/earth/overview/" target="_blank" class="nasa-link">
            View on NASA 🚀
        </a>
    </div>

    <div class="card">
        <img src="https://solarsystem.nasa.gov/system/feature_items/images/19_mars.png" alt="Mars">
        <h2>Mars</h2>
        <a href="https://solarsystem.nasa.gov/planets/mars/overview/" target="_blank" class="nasa-link">
            View on NASA 🚀
        </a>
    </div>

</section>

<footer>
    <p>© 2026 | Made by Bader 👨‍🚀</p>
</footer>

</body>
</html>
